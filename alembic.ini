# Alembic configuration for Flask REST API
#
# Typically you won't edit this directly — use Flask-Migrate CLI:
#   flask db migrate -m "message"
#   flask db upgrade
#   flask db downgrade

[alembic]
script_location = migrations
prepend_sys_path = .

# The SQLAlchemy URL is injected by Flask-Migrate from app.config.
# Leave this empty — Flask-Migrate overrides it at runtime.
sqlalchemy.url =

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
