version: '3.8'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: flask_api
      POSTGRES_PASSWORD: flask_api_pass
      POSTGRES_DB: flask_api_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flask_api"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://flask_api:flask_api_pass@db:5432/flask_api_dev
      - SECRET_KEY=change-me-in-production
      - FLASK_CONFIG=config.ProductionConfig
      - CORS_ORIGINS=*
    depends_on:
      db:
        condition: service_healthy
    command: gunicorn wsgi:app -w 4 -b 0.0.0.0:8000
    restart: unless-stopped

volumes:
  pgdata:
